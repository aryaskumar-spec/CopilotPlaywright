name: ai-playwright-workflow

description: >
  Central configuration for the AI-driven Playwright automation workflow.
  This file tells the agent which prompts, instructions, and policies must be
  used for each stage of the lifecycle.

version: 1

stages:
  testcase_generation:
    prompt: .github/prompts/testcase-generation.prompt.md
    instructions:
      - .github/instructions/framework.instructions.md
      - .github/instructions/naming.instructions.md
      - .github/instructions/playwright.instructions.md
    policies:
      - .github/policies/guardrails.md
      - .github/policies/security.md
      - .github/policies/quality.md

  code_generation:
    prompt: .github/prompts/playwright-generator.prompt.md
    instructions:
      - .github/instructions/framework.instructions.md
      - .github/instructions/coding.instructions.md
      - .github/instructions/naming.instructions.md
      - .github/instructions/playwright.instructions.md
    policies:
      - .github/policies/guardrails.md
      - .github/policies/security.md
      - .github/policies/quality.md
      - .github/policies/git-rules.md

  review:
    prompt: .github/prompts/review.prompt.md
    instructions:
      - .github/instructions/framework.instructions.md
      - .github/instructions/coding.instructions.md
      - .github/instructions/playwright.instructions.md
    policies:
      - .github/policies/guardrails.md
      - .github/policies/security.md
      - .github/policies/quality.md

  bug_fix:
    prompt: .github/prompts/bug-fix.prompt.md
    instructions:
      - .github/instructions/framework.instructions.md
      - .github/instructions/coding.instructions.md
      - .github/instructions/playwright.instructions.md
    policies:
      - .github/policies/guardrails.md
      - .github/policies/security.md
      - .github/policies/quality.md
      - .github/policies/git-rules.md

defaults:
  output:
    testcase_file: docs/generated-testcases.md
    branch_prefix: ai/
    test_root: src/tests
    page_root: src/pages
    data_root: src/test-data
    api_root: src/api
    utils_root: src/utils

  coding:
    language: typescript
    framework: playwright
    test_pattern: "*.spec.ts"
    page_object_pattern: "*.page.ts"
    fixture_pattern: "*.fixture.ts"

  execution:
    run_command: npx playwright test
    report_path: playwright-report
    junit_path: test-results/results.xml

  pull_request:
    title_template: "AI: Add Playwright tests for {{issue_title}}"
    body_template: |
      This PR was generated by the AI Playwright workflow.

      Included:
      - Test case analysis
      - Playwright automation
      - Page object updates if required
      - Review fixes

      Please validate:
      - Coverage
      - Selector stability
      - Test data assumptions
      - Environment compatibility